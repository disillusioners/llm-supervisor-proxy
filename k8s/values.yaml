# Default values for llm-supervisor-proxy chart

replicaCount: 1

image:
  registry: docker.io
  repository: disillusioners/llm-supervisor-proxy
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
namespace: llmproxy

service:
  type: ClusterIP
  port: 4321

ingress:
  enabled: true
  className: ""
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: llm.daoduc.org
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: llm-supervisor-proxy-tls
      hosts:
        - llm.daoduc.org

# PostgreSQL database configuration (required)
database:
  host: ""
  port: 5432
  database: llm_supervisor
  username: ""
  # Secret containing the password key
  passwordSecret: "llm-proxy-db-secret"
  passwordKey: password
  # Or use a full connection URL (overrides above settings)
  url: ""
  # Or use existing secret with full URL
  urlSecret: ""
  urlSecretKey: url

# Encryption key configuration (required for API key encryption)
# Generate with: openssl rand -base64 32
encryption:
  secretName: "llm-proxy-encryption-key"
  secretKey: "key"

# Environment variables (non-secret)
env:
  LOG_LEVEL: "info"

# Resources
resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 128Mi

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /healthz
    port: 4321
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: 4321
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Pod security context
podSecurityContext: {}
  # fsGroup: 1000
  # runAsUser: 1000

# Container security context
containerSecurityContext: {}
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
