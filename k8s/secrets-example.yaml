apiVersion: v1
kind: Secret
metadata:
  name: llm-proxy-db-secret
  type: Opaque
stringData:
  # Update the host and credentials with your own values
  url: "postgres://llm_proxy:YOUR_DB_PASSWORD@YOUR_DB_HOST:5432/llm_proxy?sslmode=disable"
  password: "YOUR_DB_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-proxy-encryption-key
type: Opaque
stringData:
  # Generate with: go run pkg/crypto/encryption.go -generate
  # Or use: openssl rand -base64 32
  # IMPORTANT: Save this key securely! Lost key = lost API credentials
  key: "7AyshhcLzoREte6Twi7bg8e96jv5L/vB7jYQ1kx10So="
---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secret
  namespace: llmproxy
type: Opaque
stringData:
  CLIENT_ID: "YOUR_OAUTH2_CLIENT_ID"
  CLIENT_SECRET: "YOUR_OAUTH2_CLIENT_SECRET"
  COOKIE_SECRET: "YOUR_OAUTH2_COOKIE_SECRET"
