{{- if .Values.ingress.enabled -}}
{{- $fullName := include "llm-supervisor-proxy.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $host := (index .Values.ingress.hosts 0).host -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-public
  labels:
    {{- include "llm-supervisor-proxy.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - secretName: {{ $fullName }}-tls
      hosts:
        - {{ $host }}
  rules:
    - host: {{ $host }}
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 4180
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
{{- end }}
