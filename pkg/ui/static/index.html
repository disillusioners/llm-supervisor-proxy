<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Supervisor Proxy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            900: '#111827',
                            800: '#1f2937',
                            700: '#374151',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937; 
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280; 
        }
        .monitor-font {
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center shadow-md z-10">
        <div class="flex items-center space-x-3">
            <div class="p-2 bg-blue-600 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-wide">LLM Supervisor Proxy</h1>
        </div>
        <div class="text-sm text-gray-400 flex items-center space-x-4">
            <div class="flex items-center space-x-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span>System Active</span>
            </div>
            <button id="btn-config" class="text-gray-400 hover:text-white transition-colors" title="Configuration">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Content Grid -->
    <main class="flex-1 grid grid-cols-12 gap-0 overflow-hidden">
        
        <!-- Left Panel: Request List (Cols 3) -->
        <section class="col-span-3 bg-gray-900 flex flex-col border-r border-gray-700 min-w-0 min-h-0">
             <div class="p-3 bg-gray-800 border-b border-gray-700 flex justify-between items-center h-[52px]">
                <h2 class="text-sm font-semibold text-gray-300 flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    Requests
                </h2>
                <button id="refresh-requests" class="p-1 hover:bg-gray-700 rounded text-gray-400 transition-colors" title="Refresh">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
            <div id="request-list" class="flex-1 overflow-y-auto p-0 space-y-0 text-sm">
                <!-- Request items will go here -->
                <div class="p-4 text-gray-500 text-center text-xs">No requests yet</div>
            </div>
        </section>

        <!-- Middle Panel: Details (Cols 5) -->
        <section class="col-span-5 bg-gray-800 flex flex-col border-r border-gray-700 min-w-0 min-h-0">
             <div class="p-3 bg-gray-800 border-b border-gray-700 flex justify-between items-center h-[52px]">
                <h2 class="text-sm font-semibold text-gray-300 flex items-center">Request Details</h2>
            </div>
            <div id="detail-empty" class="p-6 text-center text-gray-500 text-sm mt-10">Select a request to view details</div>
            <div id="detail-content" class="hidden flex-1 flex flex-col overflow-y-auto p-4 space-y-4 monitor-font text-sm">
                <!-- Messages go here -->
            </div>
        </section>

        <!-- Right Panel: Logs (Cols 4) -->
        <section class="col-span-4 bg-[#0d1117] flex flex-col min-w-0 min-h-0">
            <div class="p-3 bg-gray-800 border-b border-gray-700 flex justify-between items-center h-[52px]">
                <h2 class="text-sm font-semibold text-gray-300 flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Event Log
                </h2>
                <div class="flex space-x-2">
                    <button id="clear-logs" class="p-1 hover:bg-gray-700 rounded text-gray-400 transition-colors" title="Clear Logs">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <button id="toggle-scroll" class="p-1 hover:bg-gray-700 rounded text-green-400 transition-colors" title="Auto-scroll On">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 13l-7 7-7-7m14-8l-7 7-7-7"></path></svg>
                    </button>
                </div>
            </div>
            <div id="log-container" class="flex-1 overflow-y-auto p-4 space-y-2 monitor-font text-xs">
                <div class="text-gray-500 italic">Select a request to view logs...</div>
            </div>
        </section>
        
        <!-- Config Modal -->
        <div id="modal-config" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex justify-center items-center">
            <div class="bg-gray-800 border border-gray-700 rounded-lg shadow-xl w-full max-w-2xl flex flex-col mb-[10vh] max-h-[80vh]">
                <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-900 rounded-t-lg">
                    <h2 class="text-white font-bold text-lg">Configuration</h2>
                    <button id="close-config" class="text-gray-400 hover:text-white transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
                <!-- Tabs -->
                <div class="flex border-b border-gray-700">
                    <button class="config-tab px-6 py-3 text-sm font-medium text-blue-400 border-b-2 border-blue-400" data-tab="proxy">Proxy Settings</button>
                    <button class="config-tab px-6 py-3 text-sm font-medium text-gray-400 hover:text-gray-200" data-tab="models">Models</button>
                </div>
                
                <!-- Proxy Settings Tab -->
                <div id="tab-proxy" class="config-tab-content p-6 space-y-6 overflow-y-auto flex-1">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Upstream URL</label>
                            <div class="flex items-center bg-gray-900 rounded-md border border-gray-700 px-3 py-2">
                                <svg class="w-4 h-4 text-gray-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                <input type="text" id="upstream-url" class="bg-transparent border-none text-gray-200 text-sm w-full focus:ring-0 placeholder-gray-600" placeholder="http://localhost:4000">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Idle Timeout</label>
                                <div class="flex items-center bg-gray-900 rounded-md border border-gray-700 px-3 py-2">
                                    <svg class="w-4 h-4 text-gray-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    <input type="text" id="idle-timeout" class="bg-transparent border-none text-gray-200 text-sm w-full focus:ring-0 placeholder-gray-600" placeholder="10s">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Max Retries</label>
                                <div class="flex items-center bg-gray-900 rounded-md border border-gray-700 px-3 py-2">
                                    <input type="number" id="max-retries" class="bg-transparent border-none text-gray-200 text-sm w-full focus:ring-0 placeholder-gray-600" placeholder="1">
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Max Gen Time</label>
                             <div class="flex items-center bg-gray-900 rounded-md border border-gray-700 px-3 py-2">
                                <input type="text" id="max-gen-time" class="bg-transparent border-none text-gray-200 text-sm w-full focus:ring-0 placeholder-gray-600" placeholder="3m">
                            </div>
                        </div>

                        <div class="pt-4">
                            <button id="apply-config" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-colors shadow-lg shadow-blue-900/50 flex justify-center items-center">
                                <span>Apply Changes</span>
                            </button>
                        </div>
                         <div id="config-status" class="text-xs text-center min-h-[1.5em] transition-opacity duration-500 opacity-0"></div>
                    </div>
                </div>
                
                <!-- Models Tab -->
                <div id="tab-models" class="config-tab-content hidden p-6 overflow-y-auto flex-1">
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <p class="text-xs text-gray-400">Configure models and their fallback chains. Max 3 models in chain.</p>
                            <button id="add-model-btn" class="text-xs bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded transition-colors">+ Add Model</button>
                        </div>
                        <div id="models-list" class="space-y-2">
                            <!-- Models will be loaded here -->
                            <div class="text-gray-500 text-sm text-center py-4">Loading models...</div>
                        </div>
                        <div id="models-status" class="text-xs text-center min-h-[1.5em] transition-opacity duration-500 opacity-0"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- State ---
        let autoScroll = true;
        let selectedRequestId = null;
        const globalLogsMap = {}; // RequestID -> Array of Log Entries
        
        // Element Refs
        const logContainer = document.getElementById('log-container');
        const clearBtn = document.getElementById('clear-logs');
        const scrollBtn = document.getElementById('toggle-scroll');
        const refreshReqBtn = document.getElementById('refresh-requests');
        const requestListEl = document.getElementById('request-list');
        const detailContentEl = document.getElementById('detail-content');
        const detailEmptyEl = document.getElementById('detail-empty');
        const btnConfig = document.getElementById('btn-config');
        const modalConfig = document.getElementById('modal-config');
        const closeConfigBtn = document.getElementById('close-config');

        // --- Config Modal logic ---
        btnConfig.onclick = () => {
            modalConfig.classList.remove('hidden');
            loadConfig(); // Reload latest
            loadModels(); // Load models when modal opens
        };
        closeConfigBtn.onclick = () => {
            modalConfig.classList.add('hidden');
        };
        modalConfig.onclick = (e) => {
            if (e.target === modalConfig) modalConfig.classList.add('hidden');
        }

        // --- Tab Switching ---
        const configTabs = document.querySelectorAll('.config-tab');
        const tabContents = document.querySelectorAll('.config-tab-content');
        configTabs.forEach(tab => {
            tab.onclick = () => {
                const targetTab = tab.dataset.tab;
                configTabs.forEach(t => {
                    t.classList.remove('text-blue-400', 'border-b-2', 'border-blue-400');
                    t.classList.add('text-gray-400');
                });
                tab.classList.remove('text-gray-400');
                tab.classList.add('text-blue-400', 'border-b-2', 'border-blue-400');
                tabContents.forEach(content => {
                    content.classList.add('hidden');
                });
                document.getElementById('tab-' + targetTab).classList.remove('hidden');
            };
        });

        // --- Log Logic ---
        function renderSingleLog(data) {
            const entry = document.createElement('div');
            entry.className = "flex space-x-2 border-b border-gray-800 pb-1 mb-1 last:border-0";
            
            const ts = new Date(data.timestamp * 1000).toISOString().split('T')[1].split('.')[0];
            let typeColor = "text-gray-400";
            let msg = JSON.stringify(data.data);

            // Format message based on type
            if (data.type === 'request_started') {
                 typeColor = "text-blue-400";
                 msg = `Processing new request...`;
            } else if (data.type === 'timeout_idle') {
                typeColor = "text-red-400";
                msg = `Idle timeout detected (${data.data ? data.data.timeout : '?'})`;
            } else if (data.type === 'retry_attempt') {
                typeColor = "text-purple-400";
                msg = `Retrying request (Attempt ${data.data ? data.data.attempt : '?'})`;
            } else if (data.type.includes('error')) {
                typeColor = "text-red-500";
                msg = `Error: ${data.data && data.data.error ? data.data.error : JSON.stringify(data.data)}`;
            } else if (data.type === 'request_completed') {
                typeColor = "text-green-400";
                msg = "Request completed successfully.";
            }

            // Remove placeholder text if it's there
            if (logContainer.children.length === 1 && logContainer.children[0].innerText.includes("view logs")) {
                logContainer.innerHTML = "";
            }

            entry.innerHTML = `
                <span class="text-gray-600 font-mono w-20 shrink-0">[${ts}]</span>
                <span class="${typeColor} font-bold w-40 shrink-0">[${data.type.toUpperCase()}]</span>
                <span class="text-gray-300 break-all">${msg}</span>
            `;
            
            logContainer.appendChild(entry);
            if (autoScroll) logContainer.scrollTop = logContainer.scrollHeight;
        }

        const evtSource = new EventSource("/api/events");
        evtSource.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            const reqId = (data.data && typeof data.data === 'object' && data.data.id) ? data.data.id : null;
            if (reqId) {
                if (!globalLogsMap[reqId]) {
                    globalLogsMap[reqId] = [];
                }
                globalLogsMap[reqId].push(data);
                
                // Real-time render if this is the selected request
                if (selectedRequestId === reqId) {
                    renderSingleLog(data);
                }
            }

            // Refresh request list automatically on some events
            if (['request_started', 'request_completed', 'retry_attempt', 'error_max_retries', 'timeout_idle'].includes(data.type)) {
                fetchRequests();
            }
        };

        clearBtn.onclick = () => {
            if (selectedRequestId && globalLogsMap[selectedRequestId]) {
                globalLogsMap[selectedRequestId] = [];
            }
            logContainer.innerHTML = '<div class="text-gray-500 italic">Logs cleared for this request.</div>';
        };

        scrollBtn.onclick = () => {
            autoScroll = !autoScroll;
            scrollBtn.className = autoScroll ? "p-1 hover:bg-gray-700 rounded text-green-400" : "p-1 hover:bg-gray-700 rounded text-gray-400";
        };

        // --- Config Logic ---
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const cfg = await res.json();
                document.getElementById('upstream-url').value = cfg.UpstreamURL;
                document.getElementById('idle-timeout').value = (cfg.IdleTimeout / 1e9) + "s";
                document.getElementById('max-gen-time').value = (cfg.MaxGenerationTime / 1e9) + "s";
                document.getElementById('max-retries').value = cfg.MaxRetries;
            } catch (e) {
                console.error("Failed to load config", e);
            }
        }

        document.getElementById('apply-config').onclick = async () => {
             const payload = {
                UpstreamURL: document.getElementById('upstream-url').value,
                IdleTimeout: parseDuration(document.getElementById('idle-timeout').value),
                MaxGenerationTime: parseDuration(document.getElementById('max-gen-time').value),
                MaxRetries: parseInt(document.getElementById('max-retries').value)
            };

            try {
                await fetch('/api/config', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const status = document.getElementById('config-status');
                status.innerText = "Configuration applied successfully!";
                status.classList.replace('text-red-500', 'text-green-500');
                status.classList.remove('opacity-0');
                setTimeout(() => status.classList.add('opacity-0'), 3000);
            } catch (e) {
                const status = document.getElementById('config-status');
                status.innerText = "Failed to update config.";
                status.classList.add('text-red-500');
                status.classList.remove('opacity-0');
            }
        };

        function parseDuration(s) {
            let mult = 1e9;
            if (s.endsWith('ms')) { mult = 1e6; s = s.slice(0,-2); }
            else if (s.endsWith('s')) { mult = 1e9; s = s.slice(0,-1); }
            else if (s.endsWith('m')) { mult = 60 * 1e9; s = s.slice(0,-1); }
            return Math.floor(parseFloat(s) * mult);
        }

        // --- Models Management ---
        let modelsData = [];

        async function loadModels() {
            try {
                const res = await fetch('/api/models');
                const data = await res.json();
                modelsData = data.models || [];
                renderModels();
            } catch (e) {
                console.error("Failed to load models", e);
                document.getElementById('models-list').innerHTML = '<div class="text-red-500 text-sm text-center py-4">Failed to load models</div>';
            }
        }

        function renderModels() {
            const container = document.getElementById('models-list');
            if (modelsData.length === 0) {
                container.innerHTML = '<div class="text-gray-500 text-sm text-center py-4">No models configured</div>';
                return;
            }
            container.innerHTML = modelsData.map(m => `
                <div class="bg-gray-900 border border-gray-700 rounded-lg p-3 flex justify-between items-center">
                    <div class="flex-1">
                        <div class="flex items-center space-x-2">
                            <span class="w-2 h-2 rounded-full ${m.enabled ? 'bg-green-500' : 'bg-gray-500'}"></span>
                            <span class="font-medium text-gray-200">${escapeHtml(m.name)}</span>
                            <span class="text-xs text-gray-500">(${escapeHtml(m.id)})</span>
                        </div>
                        <div class="text-xs text-gray-500 mt-1">
                            Fallback: ${m.fallback_chain && m.fallback_chain.length > 0 ? m.fallback_chain.map(fb => escapeHtml(fb)).join(' → ') : '(none)'}
                        </div>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="editModel('${escapeHtml(m.id)}')" class="text-gray-400 hover:text-white p-1" title="Edit">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        </button>
                        <button onclick="deleteModel('${escapeHtml(m.id)}')" class="text-gray-400 hover:text-red-500 p-1" title="Delete">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function editModel(id) {
            const model = modelsData.find(m => m.id === id);
            if (!model) return;
            const newName = prompt('Model Name:', model.name);
            if (newName === null) return;
            const fallbackStr = prompt('Fallback Chain (comma-separated model IDs):', (model.fallback_chain || []).join(', '));
            if (fallbackStr === null) return;
            const fallbackChain = fallbackStr.split(',').map(s => s.trim()).filter(s => s);
            const enabled = confirm('Enable this model?');
            
            saveModel(id, { name: newName, enabled, fallback_chain: fallbackChain });
        }

        async function saveModel(id, updates) {
            try {
                const res = await fetch('/api/models/' + id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });
                if (!res.ok) {
                    const err = await res.json();
                    showModelsStatus(err.error || 'Failed to update model', 'error');
                    return;
                }
                showModelsStatus('Model updated successfully', 'success');
                loadModels();
            } catch (e) {
                showModelsStatus('Failed to update model', 'error');
            }
        }

        async function deleteModel(id) {
            if (!confirm('Are you sure you want to delete this model?')) return;
            try {
                const res = await fetch('/api/models/' + id, { method: 'DELETE' });
                if (!res.ok) {
                    showModelsStatus('Failed to delete model', 'error');
                    return;
                }
                showModelsStatus('Model deleted', 'success');
                loadModels();
            } catch (e) {
                showModelsStatus('Failed to delete model', 'error');
            }
        }

        document.getElementById('add-model-btn').onclick = () => {
            const id = prompt('Model ID (e.g., gpt-4):');
            if (!id) return;
            const name = prompt('Display Name:');
            if (!name) return;
            const fallbackStr = prompt('Fallback Chain (comma-separated):', '');
            const fallbackChain = fallbackStr ? fallbackStr.split(',').map(s => s.trim()).filter(s => s) : [];
            
            fetch('/api/models', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, name, enabled: true, fallback_chain: fallbackChain })
            }).then(res => {
                if (!res.ok) return res.json().then(e => Promise.reject(e));
                showModelsStatus('Model added', 'success');
                loadModels();
            }).catch(e => {
                showModelsStatus(e.error || 'Failed to add model', 'error');
            });
        };

        function showModelsStatus(msg, type) {
            const status = document.getElementById('models-status');
            status.innerText = msg;
            status.className = 'text-xs text-center min-h-[1.5em] transition-opacity duration-500 ' + (type === 'error' ? 'text-red-500' : 'text-green-500');
            status.classList.remove('opacity-0');
            setTimeout(() => status.classList.add('opacity-0'), 3000);
        }

        // --- Request Logic ---
        async function fetchRequests() {
            try {
                const res = await fetch('/api/requests');
                const reqs = await res.json();
                renderRequestList(reqs);
            } catch (e) {
                console.error("Failed to fetch requests", e);
            }
        }

        function renderRequestList(reqs) {
            requestListEl.innerHTML = "";
            if (!reqs || reqs.length === 0) {
                 requestListEl.innerHTML = '<div class="p-4 text-gray-500 text-center text-xs">No requests yet</div>';
                 return;
            }

            reqs.forEach(req => {
                const el = document.createElement('div');
                el.className = `p-3 border-b border-gray-800 hover:bg-gray-800 flex flex-col cursor-pointer transition-colors ${selectedRequestId === req.id ? 'bg-gray-800 border-l-4 border-l-blue-500' : 'border-l-4 border-l-transparent'}`;
                
                let statusColor = "bg-gray-500";
                if (req.status === 'completed') statusColor = "bg-green-500";
                else if (req.status === 'failed') statusColor = "bg-red-500";
                else if (req.status === 'running') statusColor = "bg-blue-500 animate-pulse";
                else if (req.status === 'retrying') statusColor = "bg-purple-500 animate-pulse";

                const ts = new Date(req.startTime).toLocaleTimeString();

                el.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <div class="flex items-center space-x-2">
                             <span class="w-2 h-2 rounded-full ${statusColor}"></span>
                             <span class="font-bold text-gray-200">${req.model || 'Unknown'}</span>
                        </div>
                        <span class="text-xs text-gray-500">${ts}</span>
                    </div>
                    <div class="flex justify-between items-center text-xs text-gray-400">
                        <span>${req.id.substring(0,8)}...</span>
                        <span>${req.duration}</span>
                    </div>
                    ${req.retries > 0 ? `<div class="mt-1"><span class="text-[10px] bg-purple-900 text-purple-200 px-1 rounded">Retries: ${req.retries}</span></div>` : ''}
                `;
                el.onclick = () => selectRequest(req.id);
                requestListEl.appendChild(el);
            });
        }

        async function selectRequest(id) {
            selectedRequestId = id;
            fetchRequests(); // Re-render logic

            // Repopulate Event Logs
            logContainer.innerHTML = '';
            if (globalLogsMap[id] && globalLogsMap[id].length > 0) {
                globalLogsMap[id].forEach(renderSingleLog);
            } else {
                logContainer.innerHTML = '<div class="text-gray-500 italic text-center mt-4">No events found for this request.</div>';
            }
            
            // Repopulate Request Detail
            try {
                const res = await fetch(`/api/requests/${id}`);
                const fullReq = await res.json();
                renderRequestDetail(fullReq);
            } catch (e) {
                console.error("Failed to fetch request detail", e);
            }
        }

        function renderRequestDetail(req) {
            detailEmptyEl.classList.add('hidden');
            detailContentEl.classList.remove('hidden');
            detailContentEl.innerHTML = "";
            
            // Header
            const header = document.createElement('div');
            header.className = "mb-4 border-b border-gray-700 pb-2 shrink-0";
            header.innerHTML = `
                <div class="grid grid-cols-2 gap-2 text-xs text-gray-400">
                    <div>ID: <span class="text-gray-200 font-mono">${req.id}</span></div>
                    <div>Status: <span class="text-gray-200">${req.status}</span></div>
                    <div>Model: <span class="text-gray-200">${req.model}</span></div>
                    <div>Duration: <span class="text-gray-200">${req.duration}</span></div>
                </div>
                ${req.error ? `<div class="mt-2 p-2 bg-red-900/30 border border-red-500/50 rounded text-red-200 text-xs">${req.error}</div>` : ''}
            `;
            detailContentEl.appendChild(header);

            // Messages
            req.messages.forEach(msg => {
                const bubble = document.createElement('div');
                let alignment = "bg-gray-700 ml-0 mr-8";
                let label = "User";
                
                if (msg.role === 'assistant') {
                    alignment = "bg-blue-900/40 ml-8 mr-0 border border-blue-500/30";
                    label = "Assistant";
                } else if (msg.role === 'system') {
                    alignment = "bg-gray-800 mx-4 border border-gray-600 border-dashed text-gray-400 italic";
                    label = "System";
                }

                bubble.className = `p-3 rounded-lg mb-3 shrink-0 last:mb-0 ${alignment}`;
                
                let contentHtml = `<div class="text-[10px] uppercase font-bold text-gray-400 mb-1">${label}</div>`;

                if (msg.thinking) {
                    contentHtml += `
                        <div class="mt-2 mb-2">
                            <details class="group">
                                <summary class="cursor-pointer text-xs font-medium text-gray-500 hover:text-gray-300 select-none flex items-center">
                                    <svg class="w-3 h-3 mr-1 group-open:rotate-90 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                    Thought Process
                                </summary>
                                <div class="mt-1 p-3 bg-gray-800 rounded text-sm text-gray-400 italic">
                                    ${escapeHtml(msg.thinking)}
                                </div>
                            </details>
                        </div>
                    `;
                }

                if (msg.tool_calls && msg.tool_calls.length > 0) {
                    contentHtml += `<div class="mt-2 space-y-2">`;
                    msg.tool_calls.forEach(tool => {
                        contentHtml += `
                            <div class="bg-gray-900 rounded border border-gray-700 overflow-hidden">
                                <div class="px-3 py-2 bg-gray-800 border-b border-gray-700 flex justify-between items-center">
                                    <span class="text-xs font-mono text-purple-400">TOOL CALL: ${escapeHtml(tool.function.name)}</span>
                                    <span class="text-xs text-gray-500 font-mono">${escapeHtml(tool.id || '')}</span>
                                </div>
                                <div class="p-3 font-mono text-xs text-green-400 whitespace-pre-wrap">${escapeHtml(tool.function.arguments)}</div>
                            </div>
                        `;
                    });
                    contentHtml += `</div>`;
                }

                 if (msg.content && msg.content.includes("[TOOL CALL:")) {
                    contentHtml += `
                        <div class="mt-2 p-2 bg-purple-900/20 border border-purple-500/30 rounded text-purple-300 text-sm font-mono">
                            ${escapeHtml(msg.content)}
                        </div>
                    `;
                } else if (msg.content) {
                    contentHtml += `<div class="whitespace-pre-wrap">${escapeHtml(msg.content)}</div>`;
                }
                
                bubble.innerHTML = contentHtml;
                detailContentEl.appendChild(bubble);
            });

            if (req.response && req.status === 'completed') {
                 const bubble = document.createElement('div');
                 bubble.className = "shrink-0 p-3 rounded-lg mb-3 bg-green-900/20 ml-8 mr-0 border border-green-500/30";
                 bubble.innerHTML = `
                    <div class="text-[10px] uppercase font-bold text-green-400 mb-1">Final Response</div>
                    <div class="whitespace-pre-wrap">${escapeHtml(req.response)}</div>
                `;
                detailContentEl.appendChild(bubble);
            }
        }

        function escapeHtml(text) {
            if (!text) return "";
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        refreshReqBtn.onclick = fetchRequests;

        // Init
        loadConfig();
        fetchRequests();
    </script>
</body>
</html>
